    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(45, 212, 191, 0.18), transparent 28%),
                radial-gradient(circle at 82% 10%, rgba(129, 140, 248, 0.2), transparent 32%),
                linear-gradient(135deg, #020617 0%, #0f172a 48%, #111827 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #e5e7eb;
            letter-spacing: 0;
        }

        .main-container {
            max-width: 100%;
            margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            min-height: 100vh;
        }

        /* Лява страна – само теми */
        .left-panel {
            display: flex;
            flex-direction: column;
            background:
                linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(37, 47, 64, 0.94)),
                linear-gradient(135deg, rgba(20, 184, 166, 0.16), rgba(99, 102, 241, 0.12));
            color: white;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.18);
            box-shadow: 18px 0 45px rgba(15, 23, 42, 0.16);
            min-height: 0;
            backdrop-filter: blur(18px);
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.76);
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, #4f46e5 0%, #0891b2 100%);
            color: white;
            padding: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0;
        }

        .left-panel .panel-header {
            background: rgba(15, 23, 42, 0.62);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.04);
        }

        .panel-content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 20px;
        }

        .left-panel .panel-content {
            padding: 12px;
        }

        .code-editor-wrapper {
            flex-shrink: 0;
            margin: 0 24px 20px;
            background: rgba(15, 23, 42, 0.72);
            border-radius: 14px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.22);
            backdrop-filter: blur(18px);
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
        }

        .code-editor-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 58px rgba(15, 23, 42, 0.15);
            border-color: rgba(99, 102, 241, 0.28);
        }

        .code-editor-container {
            display: flex;
            flex-direction: column;
            min-height: 260px;
        }

        .editor-toolbar {
            background: rgba(15, 23, 42, 0.86);
            padding: 12px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .editor-btn {
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 800;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            min-height: 38px;
            line-height: 1.25;
            text-align: center;
            white-space: normal;
            overflow-wrap: anywhere;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .editor-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 14px 26px rgba(79, 70, 229, 0.25);
        }

        .editor-btn.secondary {
            background: linear-gradient(135deg, #64748b, #475569);
            box-shadow: 0 10px 18px rgba(71, 85, 105, 0.18);
        }

        .editor-btn.secondary:hover {
            filter: brightness(1.05);
        }

        .editor-btn.success {
            background: linear-gradient(135deg, #16a34a, #0d9488);
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
        }

        .editor-btn.success:hover {
            filter: brightness(1.05);
        }

        .CodeMirror {
            height: 260px !important;
            font-size: 14px;
            border: none;
            border-radius: 0 0 8px 8px;
        }

        .right-panel .panel-header {
            background: rgba(15, 23, 42, 0.78);
            color: #f8fafc;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(18px);
            justify-content: space-between;
            gap: 18px;
            padding: 18px 24px;
        }

        .academy-heading {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .academy-icon {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            flex: 0 0 auto;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #14b8a6);
            color: white;
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
        }

        .academy-kicker {
            margin-bottom: 2px;
            color: #94a3b8;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .academy-title {
            color: #f8fafc;
            font-size: 1.15rem;
            font-weight: 950;
            line-height: 1.15;
        }

        .academy-subtitle {
            margin-top: 2px;
            color: #cbd5e1;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .academy-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .academy-stat {
            padding: 9px 12px;
            border-radius: 999px;
            color: #e2e8f0;
            background: rgba(30, 41, 59, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.24);
            font-size: 0.78rem;
            font-weight: 900;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
        }

        .continue-btn {
            border: none;
            border-radius: 999px;
            padding: 11px 16px;
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            font-size: 0.9rem;
            font-weight: 950;
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .admin-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px;
            border-radius: 999px;
            color: #e2e8f0;
            background: rgba(30, 41, 59, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.24);
            font-size: 0.84rem;
            font-weight: 950;
            text-decoration: none;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .admin-link:hover {
            transform: translateY(-2px);
            border-color: rgba(20, 184, 166, 0.42);
            background: rgba(51, 65, 85, 0.82);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 18px 34px rgba(79, 70, 229, 0.28);
        }

        .lesson-transition {
            animation: lessonEnter 0.34s ease both;
        }

        @keyframes lessonEnter {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #output {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* Дясно поле – материал за четене */
        .reading-panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        #reading-material {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 32px 40px;
            font-size: 1.12rem;
            line-height: 1.85;
            color: #e2e8f0;
        }

        #reading-material .read-welcome {
            text-align: center;
            padding: 64px 24px;
            color: #cbd5e1;
            max-width: 820px;
            margin: 34px auto;
            background: rgba(15, 23, 42, 0.66);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(20px);
        }

        #reading-material .read-welcome h2 {
            color: #334155;
            font-size: 1.9rem;
            font-weight: 900;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #4f46e5, #0891b2 60%, #0f766e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        #reading-material .read-welcome p {
            margin: 12px 0;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.22rem;
            line-height: 1.65;
        }

        #reading-material .read-category {
            display: inline-block;
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 16px;
            box-shadow: 0 10px 24px rgba(79, 70, 229, 0.2);
        }

        #reading-material .read-title {
            color: #f8fafc;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        #reading-material .read-lead {
            color: #cbd5e1;
            font-size: 1.25rem;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        }

        #reading-material .read-section {
            margin-bottom: 24px;
        }

        #reading-material .read-section h3 {
            color: #4f46e5;
            font-size: 1.35rem;
            font-weight: 850;
            margin-bottom: 10px;
        }

        #reading-material .read-section p {
            margin: 8px 0;
            color: #d1d5db;
            font-size: 1.13rem;
        }

        #reading-material .read-code-block {
            background: linear-gradient(135deg, #111827, #1f2937);
            color: #e5e7eb;
            padding: 18px 20px;
            border-radius: 14px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-left: 4px solid #14b8a6;
            white-space: pre;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
        }

        #reading-material .read-tip {
            background: rgba(14, 116, 144, 0.14);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #2196f3;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
        }

        #reading-material .read-tip strong {
            color: #1565c0;
        }

        #reading-material .read-warn {
            background: rgba(245, 158, 11, 0.13);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #ff9800;
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.1);
        }

        #reading-material .read-warn strong {
            color: #e65100;
        }

        #reading-material .read-next-step {
            background: rgba(22, 163, 74, 0.13);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 20px 0;
            border-left: 4px solid #28a745;
            box-shadow: 0 12px 30px rgba(22, 163, 74, 0.1);
        }

        #reading-material .read-next-step strong {
            color: #1b5e20;
        }

        #reading-material .lesson-section {
            margin-bottom: 20px;
            padding: 18px 20px;
            background: rgba(15, 23, 42, 0.62);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 16px;
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(16px);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        #reading-material .lesson-section:hover {
            transform: translateY(-2px);
            border-color: rgba(20, 184, 166, 0.24);
            box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
        }

        #reading-material .lesson-section-title {
            color: #4f46e5;
            font-size: 1.32rem;
            font-weight: 850;
            margin-bottom: 8px;
        }

        #reading-material .lesson-section-description {
            color: #d1d5db;
            font-size: 1.13rem;
            line-height: 1.8;
        }

        #reading-material .tip-box {
            background: rgba(14, 116, 144, 0.14);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #2196f3;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
        }

        #reading-material .tip-box strong {
            color: #1565c0;
        }

        #reading-material .warning-box {
            background: rgba(245, 158, 11, 0.13);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #ff9800;
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.1);
        }

        #reading-material .warning-box strong {
            color: #e65100;
        }

        .output-section {
            flex-shrink: 0;
            margin: 0 24px 24px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(15, 23, 42, 0.72);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(18px);
        }

        .output-section-title {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 800;
            color: #cbd5e1;
            background: rgba(15, 23, 42, 0.86);
        }

        #output {
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 16px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        #output:empty::before {
            content: 'Резултатите от „Изпълни код” ще се появят тук.';
            color: #666;
        }

        #output p {
            margin: 4px 0;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.06);
            border-left: 3px solid #667eea;
            border-radius: 2px;
        }

        #output .error {
            color: #f48771;
            border-left-color: #f48771;
        }

        #output .success {
            color: #4ec9b0;
            border-left-color: #4ec9b0;
        }

        .lessons-sidebar {
            background: transparent;
            padding: 0;
        }

        .language-switcher {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.035);
        }

        .lang-btn {
            min-width: 0;
            min-height: 42px;
            padding: 9px 10px;
            font-size: 0.8rem;
            line-height: 1.15;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            text-align: center;
            white-space: normal;
            overflow-wrap: anywhere;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .lang-btn.web {
            grid-column: 1 / -1;
        }

        .lang-btn.new {
            grid-column: 1 / -1;
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            border-color: rgba(255,255,255,0.22);
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
        }

        .lang-btn.js.active {
            background: linear-gradient(135deg, #fde047, #f59e0b);
            color: #333;
        }

        .lang-btn.py.active {
            background: linear-gradient(135deg, #2563eb, #0891b2);
            color: white;
        }

        .lang-btn.swift.active {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
        }

        .lang-btn.backend.active {
            background: linear-gradient(135deg, #16a34a, #0d9488);
            color: white;
        }

        .lang-btn.web.active {
            background: linear-gradient(135deg, #f97316, #dc2626);
            color: white;
        }

        .lang-btn.new.active {
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            color: white;
        }

        #html-preview-wrap {
            display: none;
            flex-shrink: 0;
            margin: 0 24px 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            background: white;
        }

        #html-preview-wrap.visible {
            display: block;
        }

        #html-preview-wrap .preview-label {
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            background: #f0f0f0;
            border-bottom: 1px solid #e0e0e0;
        }

        #html-preview {
            width: 100%;
            height: 280px;
            border: none;
            display: block;
        }

        .lessons-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: rgba(255,255,255,0.56);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding: 0 8px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .progress-panel {
            margin: 0 0 14px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 16px 36px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
        }

        .progress-topline {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: rgba(255,255,255,0.92);
            font-size: 0.78rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .progress-track {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255,255,255,0.13);
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.18);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #22c55e, #14b8a6, #6366f1);
            box-shadow: 0 0 18px rgba(20, 184, 166, 0.45);
            transition: width 0.35s ease;
        }

        .progress-meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            margin-top: 12px;
        }

        .progress-chip {
            padding: 7px 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.88);
            font-size: 0.72rem;
            font-weight: 800;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .lesson-item {
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.9);
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .lesson-item.locked {
            cursor: not-allowed;
            color: rgba(255,255,255,0.38);
            background: rgba(255,255,255,0.015);
        }

        .lesson-item.locked:hover {
            transform: none;
            box-shadow: none;
            border-left-color: transparent;
            background: rgba(255,255,255,0.035);
        }

        .lesson-item.completed {
            border-left-color: #22c55e;
            color: rgba(255,255,255,0.96);
        }

        .lesson-item:hover {
            background: rgba(255,255,255,0.1);
            border-left-color: #14b8a6;
            transform: translateX(4px);
            box-shadow: 0 10px 22px rgba(0,0,0,0.12);
        }

        .lesson-item.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.42), rgba(20, 184, 166, 0.22));
            border-left-color: #2dd4bf;
            font-weight: 800;
            color: white;
            box-shadow: 0 12px 26px rgba(20, 184, 166, 0.12);
        }

        .complete-lesson-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            color: white;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(20, 184, 166, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .complete-lesson-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 18px 34px rgba(20, 184, 166, 0.26);
        }

        .complete-lesson-btn.done {
            background: linear-gradient(135deg, #64748b, #475569);
            cursor: default;
        }

        .learning-widget {
            margin: 22px 0;
            padding: 18px 20px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.62);
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(18px);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .learning-widget:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.22);
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.13);
        }

        .learning-widget-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            color: #f8fafc;
            font-size: 1.25rem;
            font-weight: 900;
        }

        .learning-widget-badge {
            flex: 0 0 auto;
            padding: 5px 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            color: white;
            font-size: 0.75rem;
            font-weight: 900;
        }

        .challenge-prompt {
            color: #cbd5e1;
            font-size: 1.05rem;
            margin: 8px 0 12px;
        }

        .challenge-checklist {
            margin: 10px 0 0;
            padding-left: 20px;
            color: #d1d5db;
            font-size: 1rem;
        }

        .challenge-checklist li {
            margin: 4px 0;
        }

        .challenge-actions,
        .mentor-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-top: 14px;
        }

        .challenge-btn,
        .mentor-btn {
            border: none;
            border-radius: 12px;
            padding: 11px 16px;
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            font-size: 0.95rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .challenge-btn:hover,
        .mentor-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 16px 30px rgba(79, 70, 229, 0.23);
        }

        .challenge-feedback,
        .mentor-answer {
            min-height: 22px;
            margin-top: 12px;
            color: #cbd5e1;
            font-weight: 700;
        }

        .challenge-feedback.success {
            color: #15803d;
            animation: successPulse 0.42s ease;
        }

        .challenge-feedback.error {
            color: #dc2626;
        }

        .mentor-input {
            width: 100%;
            min-height: 86px;
            resize: vertical;
            border: 1px solid rgba(148, 163, 184, 0.32);
            border-radius: 14px;
            padding: 12px 14px;
            background: rgba(15, 23, 42, 0.74);
            color: #f8fafc;
            font: inherit;
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .mentor-input:focus {
            border-color: rgba(79, 70, 229, 0.58);
            background: rgba(15, 23, 42, 0.92);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.12);
        }

        @keyframes successPulse {
            0% { transform: scale(0.98); opacity: 0.65; }
            60% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); }
        }

        .lesson-title {
            color: #667eea;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .lesson-description {
            color: #666;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .code-snippet {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            margin: 10px 0;
            border-left: 4px solid #667eea;
        }

        .tip-box {
            background: #e7f3ff;
            padding: 12px 15px;
            border-radius: 6px;
            margin: 10px 0;
            border-left: 4px solid #2196f3;
        }

        .tip-box strong {
            color: #1976d2;
        }

        .category-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .onboarding-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(2, 6, 23, 0.72);
            backdrop-filter: blur(16px);
        }

        .onboarding-overlay.visible {
            display: flex;
        }

        .onboarding-panel {
            width: min(860px, 100%);
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.96);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .onboarding-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            padding: 22px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }

        .onboarding-title {
            color: #f8fafc;
            font-size: 1.35rem;
            font-weight: 950;
            line-height: 1.2;
        }

        .onboarding-copy {
            margin-top: 7px;
            color: #cbd5e1;
            font-size: 0.98rem;
            line-height: 1.55;
        }

        .onboarding-skip {
            flex: 0 0 auto;
            min-height: 38px;
            border: 1px solid rgba(148, 163, 184, 0.28);
            border-radius: 8px;
            padding: 8px 12px;
            background: rgba(30, 41, 59, 0.72);
            color: #e2e8f0;
            font: inherit;
            font-size: 0.84rem;
            font-weight: 900;
            cursor: pointer;
        }

        .path-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 18px;
        }

        .path-card {
            min-height: 148px;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 8px;
            padding: 15px;
            background: rgba(30, 41, 59, 0.62);
            color: #e5e7eb;
            text-align: left;
            cursor: pointer;
            font: inherit;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .path-card:hover {
            transform: translateY(-2px);
            border-color: rgba(20, 184, 166, 0.48);
            background: rgba(30, 41, 59, 0.86);
        }

        .path-icon {
            display: block;
            margin-bottom: 12px;
            font-size: 1.6rem;
        }

        .path-name {
            display: block;
            color: #f8fafc;
            font-size: 1rem;
            font-weight: 950;
        }

        .path-desc {
            display: block;
            margin-top: 7px;
            color: #cbd5e1;
            font-size: 0.84rem;
            line-height: 1.45;
        }

        @media (max-width: 1100px) and (min-width: 769px) {
            .main-container {
                grid-template-columns: 236px minmax(0, 1fr);
            }

            .panel-header {
                padding: 16px;
            }

            .right-panel .panel-header {
                align-items: flex-start;
                flex-direction: column;
                padding: 16px 20px;
            }

            .academy-actions {

            #reading-material .read-lead {
                font-size: 1.12rem;
            }

            .code-editor-wrapper,

            }

            .language-switcher {
                grid-template-columns: 1fr;
            }

            .lang-btn.web,

            .left-panel .panel-header {

            .language-switcher {

            .lessons-title {

            .progress-panel .progress-meta + .progress-meta {

            #lessons-list {

            .lesson-item {

            }

            .lesson-item:hover {
                transform: translateY(-1px);
                border-left-color: transparent;
                border-bottom-color: #14b8a6;
            }

            .lesson-item.active {
                border-left-color: transparent;
                border-bottom-color: #2dd4bf;
            }

            .right-panel,
            .reading-panel,
            #reading-material {
                overflow: visible;
            }

            .right-panel {
                min-width: 0;
            }

            .right-panel .panel-header {
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
                padding: 14px 16px;
            }

            .academy-heading {
                align-items: flex-start;
                gap: 10px;
            }

            .academy-icon {
                width: 38px;

                border-radius: 12px;
            }

            .academy-title {
                font-size: 1rem;
            }

            .academy-subtitle {
                font-size: 0.78rem;
            }

            .code-editor-wrapper {

            }

            .output-section {

            .editor-toolbar {
                padding: 10px;

            }

            .editor-btn {
                flex: 1 1 120px;

                padding: 10px;

            }

            .CodeMirror {
                height: 300px !important;
                font-size: 13px;
            }

            .academy-actions {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
            }

            .academy-stat,
            .admin-link,
            .continue-btn {
                width: 100%;
                min-height: 42px;
                padding: 10px 12px;
                text-align: center;
            }

            .admin-link,
            .continue-btn {

            #reading-material {

            #reading-material .read-welcome {

            #reading-material .read-welcome p,

            #reading-material .lesson-section-description,

            }

            #reading-material .read-title {

                line-height: 1.22;
            }

            #reading-material .read-section h3,

<body>
    <div class="main-container">
        <!-- Лява страна – само теми -->
        <aside class="left-panel">
            <div class="panel-header">
                <span>📚</span>
                <span>Теми</span>
            </div>
            <div class="language-switcher">
                <button type="button" class="lang-btn js active" id="btn-lang-js" onclick="switchLanguage('javascript')">JS</button>
                <button type="button" class="lang-btn py" id="btn-lang-py" onclick="switchLanguage('python')">Python</button>
                <button type="button" class="lang-btn swift" id="btn-lang-swift" onclick="switchLanguage('swift')">Swift</button>
                <button type="button" class="lang-btn backend" id="btn-lang-backend" onclick="switchLanguage('backend')">Backend</button>
                <button type="button" class="lang-btn web" id="btn-lang-web" onclick="switchLanguage('web')">HTML/CSS</button>
                <button type="button" class="lang-btn new" id="btn-lang-new" onclick="switchLanguage('new')">AI & Tools</button>
            </div>
            <div class="panel-content">
                <nav class="lessons-sidebar">
                    <div class="lessons-title" id="lessons-sidebar-title">Уроци по JavaScript</div>
                    <div class="progress-panel" id="progress-panel"></div>
                    <div id="lessons-list"></div>
                </nav>
            </div>
        </aside>

        <!-- Дясна страна – обяснение + код + резултати -->
        <main class="right-panel">
            <div class="panel-header">
                <div class="academy-heading">
                    <span class="academy-icon">📖</span>
                    <div>
                        <div class="academy-kicker">Interactive coding academy</div>
                        <div class="academy-title" id="academy-current-title">Loading lesson...</div>
                        <div class="academy-subtitle" id="academy-current-subtitle">Your next step is ready.</div>
                    </div>
                </div>
                <div class="academy-actions">
                    <div class="academy-stat" id="academy-xp-stat">0 XP</div>
                    <div class="academy-stat" id="academy-level-stat">Level 1</div>
                    <a class="admin-link" href="/admin">Admin</a>
                    <button class="continue-btn" type="button" onclick="continueLearning()">Continue Learning</button>
                </div>
            </div>
            <div class="reading-panel">
                <div id="reading-material"></div>

                <div class="code-editor-wrapper">
                    <div class="editor-toolbar">
                        <button class="editor-btn success" onclick="runCode()">▶️ Изпълни код</button>
                        <button class="editor-btn secondary" onclick="clearEditor()">🗑️ Изчисти</button>
                        <button class="editor-btn secondary" onclick="loadExample()">📋 Зареди пример</button>
                    </div>
                    <div class="code-editor-container">
                        <textarea id="code-editor"></textarea>
                    </div>
                </div>

                <div id="html-preview-wrap">
                    <div class="preview-label">Визуален преглед (HTML/CSS)</div>
                    <iframe id="html-preview" title="HTML preview" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>

                <div class="output-section">
                    <div class="output-section-title">Резултати / съобщения</div>
                    <div id="output"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="onboarding-overlay" id="onboarding-overlay" aria-modal="true" role="dialog" aria-labelledby="onboarding-title">
        <div class="onboarding-panel">
            <div class="onboarding-head">
                <div>
                    <h2 class="onboarding-title" id="onboarding-title">Избери своята пътека</h2>
                    <p class="onboarding-copy">Ще ти предложим подходящ старт според това, което искаш да учиш първо.</p>
                </div>
                <button class="onboarding-skip" type="button" onclick="skipOnboarding()">Пропусни</button>
            </div>
            <div class="path-grid">
                <button class="path-card" type="button" onclick="chooseLearningPath('frontend')">
                    <span class="path-icon">🎨</span>
                    <span class="path-name">Frontend</span>
                    <span class="path-desc">HTML, CSS, JavaScript и интерфейси.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('backend')">
                    <span class="path-icon">🛠️</span>
                    <span class="path-name">Backend</span>
                    <span class="path-desc">Node.js, API, routes и server логика.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('fullstack')">
                    <span class="path-icon">🚀</span>
                    <span class="path-name">Full Stack</span>
                    <span class="path-desc">Пълен път от основи до проект.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('ai')">
                    <span class="path-icon">🤖</span>
                    <span class="path-name">AI</span>
                    <span class="path-desc">AI инструменти, prompt-и, тестове и workflow.</span>
                </button>
            </div>
        </div>
    </div>

    <!-- CodeMirror JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <!-- Skulpt – изпълнение на Python в браузъра -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/selection/active-line.min.js"></script>

    <script src="/script.js"></script>
    <script src="/lessons-python.js"></script>
    <script src="/lessons-js-more.js"></script>
    <script src="/lessons-python-more.js"></script>
    <script src="/lessons-swift.js"></script>
    <script src="/lessons-backend.js"></script>
    <script src="/lessons-web.js"></script>
    <script src="/lessons-new.js"></script>
    <script>
        let currentLanguage = 'javascript';
        let currentLesson = null;
        let editor;
        const PROGRESS_STORAGE_KEY = 'learningEnvironmentProgressV1';
        const LAST_LESSON_STORAGE_KEY = 'learningEnvironmentLastLessonV1';
        const ONBOARDING_STORAGE_KEY = 'learningEnvironmentOnboardingV1';

        function getLessons() {
            if (currentLanguage === 'python') return lessonsPython;
            if (currentLanguage === 'swift') return lessonsSwift;
            if (currentLanguage === 'backend') return lessonsBackend;
            if (currentLanguage === 'web') return lessonsWeb;
            if (currentLanguage === 'new') return lessonsNew;
            return lessonsJS;
        }

        function getEditorMode(lang) {
            if (lang === 'python') return 'python';
            if (lang === 'web') return 'htmlmixed';
            if (lang === 'swift') return { name: 'clike', keywords: { 'let': true, 'var': true, 'func': true, 'struct': true, 'class': true, 'enum': true, 'protocol': true, 'extension': true, 'import': true, 'guard': true, 'return': true, 'if': true, 'else': true, 'switch': true, 'case': true, 'default': true, 'for': true, 'while': true, 'in': true, 'true': true, 'false': true, 'nil': true, 'print': true } };
            return 'javascript';
        }

        function getLanguageDisplayName(lang) {
            return {
                javascript: 'JavaScript',
                python: 'Python',
                swift: 'Swift',
                backend: 'Backend (Node.js & Next.js)',
                web: 'HTML & CSS',
                new: 'AI & Tools'
            }[lang] || lang;
        }

        function setPreviewVisible(show) {
            document.getElementById('html-preview-wrap').classList.toggle('visible', show);
        }

        function loadProgress() {
            try {
                return JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY)) || { completed: {} };
            } catch (error) {
                return { completed: {} };
            }
        }

        function saveProgress(progress) {
            localStorage.setItem(PROGRESS_STORAGE_KEY, JSON.stringify(progress));
        }

        function loadLastLessonState() {
            try {
                return JSON.parse(localStorage.getItem(LAST_LESSON_STORAGE_KEY)) || {};
            } catch (error) {
                return {};
            }
        }

        function saveLastLessonState(lang, lessonId) {
            const state = loadLastLessonState();
            state.lang = lang;
            state.lessonId = lessonId;
            state.byLanguage = state.byLanguage || {};
            state.byLanguage[lang] = lessonId;
            localStorage.setItem(LAST_LESSON_STORAGE_KEY, JSON.stringify(state));
        }

        function getLessonProgressKey(lang, lessonId) {
            return `${lang}:${lessonId}`;
        }

        function isLessonCompleted(lang, lessonId) {
            const progress = loadProgress();
            return Boolean(progress.completed[getLessonProgressKey(lang, lessonId)]);
        }

        function getCompletedCount(lang) {
            const topics = topicsByLanguage[lang] || [];
            return topics.filter(topic => isLessonCompleted(lang, topic.id)).length;
        }

        function getTotalCompletedCount() {
            return Object.keys(topicsByLanguage).reduce((sum, lang) => sum + getCompletedCount(lang), 0);
        }

        function getLevelFromXp(xp) {
            return Math.floor(xp / 100) + 1;
        }

        function getXpToNextLevel(xp) {
            const remainder = xp % 100;
            return remainder === 0 ? 100 : 100 - remainder;
        }

        function isLessonUnlocked(lang, lessonId) {
            const topics = topicsByLanguage[lang] || [];
            const index = topics.findIndex(topic => topic.id === lessonId);
            if (index <= 0) return true;
            return isLessonCompleted(lang, topics[index - 1].id);
        }

        function getFirstLessonId(lang) {
            return topicsByLanguage[lang]?.[0]?.id || null;
        }

        function getFirstUnlockedLessonId(lang) {
            const topics = topicsByLanguage[lang] || [];
            return topics.find(topic => isLessonUnlocked(lang, topic.id))?.id || getFirstLessonId(lang);
        }

        function getNextLessonId(lang, lessonId) {
            const topics = topicsByLanguage[lang] || [];
            const index = topics.findIndex(topic => topic.id === lessonId);
            if (index < 0 || index >= topics.length - 1) return null;
            return topics[index + 1].id;
        }

        function getLastLessonForLanguage(lang) {
            const state = loadLastLessonState();
            const lessonId = state.byLanguage?.[lang] || (state.lang === lang ? state.lessonId : null);
            if (lessonId && topicsByLanguage[lang]?.some(topic => topic.id === lessonId)) {
                return lessonId;
            }
            return null;
        }

        function setLanguageChrome(lang) {
            currentLanguage = lang;

            document.getElementById('btn-lang-js').classList.toggle('active', lang === 'javascript');
            document.getElementById('btn-lang-py').classList.toggle('active', lang === 'python');
            document.getElementById('btn-lang-swift').classList.toggle('active', lang === 'swift');
            document.getElementById('btn-lang-backend').classList.toggle('active', lang === 'backend');
            document.getElementById('btn-lang-web').classList.toggle('active', lang === 'web');
            document.getElementById('btn-lang-new').classList.toggle('active', lang === 'new');

            const titles = {
                javascript: 'Уроци по JavaScript (18)',
                python: 'Уроци по Python (18)',
                swift: 'Уроци по Swift (19)',
                backend: 'Backend – Node & Next (19)',
                web: 'HTML & CSS (16)',
                new: 'AI & Tools (8)'
            };
            document.getElementById('lessons-sidebar-title').textContent = titles[lang];

            if (editor) {
                editor.setOption('mode', getEditorMode(lang));
                editor.setValue(defaultCodeByLanguage[lang] || '');
            } else {
                document.getElementById('code-editor').value = defaultCodeByLanguage[lang] || '';
            }

            setPreviewVisible(lang === 'web');
            renderTopicsList();
            renderProgressPanel();
            updateAcademyHeader();
        }

        function updateAcademyHeader() {
            const xp = getTotalCompletedCount() * 25;
            const level = getLevelFromXp(xp);
            const lesson = currentLesson ? getLessons()[currentLesson] : null;
            const completed = getCompletedCount(currentLanguage);
            const total = topicsByLanguage[currentLanguage]?.length || 0;

            const titleEl = document.getElementById('academy-current-title');
            const subtitleEl = document.getElementById('academy-current-subtitle');
            const xpEl = document.getElementById('academy-xp-stat');
            const levelEl = document.getElementById('academy-level-stat');

            if (titleEl) titleEl.textContent = lesson ? lesson.title.replace(/^[^\s]+\s*/, '') : 'Continue your path';
            if (subtitleEl) subtitleEl.textContent = `${getLanguageDisplayName(currentLanguage)} • ${completed}/${total} lessons complete`;
            if (xpEl) xpEl.textContent = `${xp} XP`;
            if (levelEl) levelEl.textContent = `Level ${level}`;
        }

        function renderProgressPanel() {
            const panel = document.getElementById('progress-panel');
            const topics = topicsByLanguage[currentLanguage] || [];
            if (!panel || !topics.length) return;

            const completed = getCompletedCount(currentLanguage);
            const total = topics.length;
            const percent = Math.round((completed / total) * 100);
            const xp = getTotalCompletedCount() * 25;
            const level = getLevelFromXp(xp);
            const nextXp = getXpToNextLevel(xp);

            panel.innerHTML = `
                <div class="progress-topline">
                    <span>Progress</span>
                    <span>${percent}%</span>
                </div>
                <div class="progress-track" aria-label="Progress ${percent}%">
                    <div class="progress-fill" style="width: ${percent}%"></div>
                </div>
                <div class="progress-meta">
                    <div class="progress-chip">${completed}/${total}</div>
                    <div class="progress-chip">${xp} XP</div>
                    <div class="progress-chip">Level ${level}</div>
                </div>
                <div class="progress-meta">
                    <div class="progress-chip">Next ${nextXp} XP</div>
                    <div class="progress-chip">${completed ? '🏅 Active' : 'Start'}</div>
                    <div class="progress-chip">${completed === total ? 'Mastered' : 'Unlock'}</div>
                </div>
            `;
            updateAcademyHeader();
        }

        function completeCurrentLesson() {
            if (!currentLesson) return;
            const progress = loadProgress();
            const key = getLessonProgressKey(currentLanguage, currentLesson);
            const nextLessonId = getNextLessonId(currentLanguage, currentLesson);
            if (!progress.completed[key]) {
                progress.completed[key] = new Date().toISOString();
                saveProgress(progress);
            }
            renderTopicsList();
            renderProgressPanel();
            loadLesson(currentLesson, document.querySelector(`[data-lesson-id="${currentLesson}"]`));
            displayOutput('🎉 Урокът е завършен! +25 XP', 'success');

            if (nextLessonId) {
                displayOutput('➡️ Следващият урок се отключи. Зареждам го след момент...', 'success');
                setTimeout(() => {
                    loadLesson(nextLessonId, document.querySelector(`[data-lesson-id="${nextLessonId}"]`));
                }, 900);
            } else {
                displayOutput('🏆 Завърши всички уроци в тази секция.', 'success');
            }
        }

        function getChallengeForLesson(lang) {
            const challenges = {
                javascript: {
                    title: 'Interactive challenge',
                    prompt: 'Напиши функция add(a, b), която връща сбора на двете числа.',
                    checks: ['Има функция add', 'Използва return', 'add(2, 3) връща 5']
                },
                new: {
                    title: 'Interactive challenge',
                    prompt: 'Напиши функция buildPrompt(task), която връща "Задача: " + task.',
                    checks: ['Има функция buildPrompt', 'Използва return', 'buildPrompt("тест") връща "Задача: тест"']
                },
                python: {
                    title: 'Interactive challenge',
                    prompt: 'Напиши Python функция add(a, b), която връща сбора на двете числа.',
                    checks: ['Има def add', 'Използва return', 'В кода има събиране с +']
                },
                web: {
                    title: 'Interactive challenge',
                    prompt: 'Добави HTML бутон и CSS hover ефект за него.',
                    checks: ['Има <button>', 'Има CSS :hover', 'Има стилове за padding или background']
                },
                swift: {
                    title: 'Interactive challenge',
                    prompt: 'Напиши Swift функция greet(name:), която print-ва поздрав.',
                    checks: ['Има func greet', 'Има параметър name', 'Има print']
                },
                backend: {
                    title: 'Interactive challenge',
                    prompt: 'Напиши примерен fetch към /api/test и обработи JSON отговора.',
                    checks: ['Има fetch', 'Има /api/test', 'Има .json() или await']
                }
            };
            return challenges[lang] || challenges.javascript;
        }

        function renderChallengeCard() {
            const challenge = getChallengeForLesson(currentLanguage);
            const checklist = challenge.checks.map(item => `<li>${escapeHtml(item)}</li>`).join('');
            return `
                <div class="learning-widget" id="challenge-card">
                    <div class="learning-widget-title">
                        <span>⚡ ${escapeHtml(challenge.title)}</span>
                        <span class="learning-widget-badge">auto-check</span>
                    </div>
                    <p class="challenge-prompt">${escapeHtml(challenge.prompt)}</p>
                    <ul class="challenge-checklist">${checklist}</ul>
                    <div class="challenge-actions">
                        <button class="challenge-btn" onclick="checkInteractiveChallenge()">Провери задачата</button>
                    </div>
                    <div class="challenge-feedback" id="challenge-feedback"></div>
                </div>
            `;
        }

        function runJavaScriptChallenge(code, fnName, expected) {
            try {
                const result = Function(`${code}; return typeof ${fnName} === "function" ? ${fnName}(${expected.args}) : undefined;`)();
                return result === expected.value;
            } catch (error) {
                return false;
            }
        }

        function checkInteractiveChallenge() {
            const feedback = document.getElementById('challenge-feedback');
            if (!feedback || !editor) return;
            const code = editor.getValue();
            let passed = false;
            let hint = '';

            if (currentLanguage === 'javascript') {
                passed = /function\s+add\s*\(|(?:const|let)\s+add\s*=/.test(code) &&
                    /return/.test(code) &&
                    runJavaScriptChallenge(code, 'add', { args: '2, 3', value: 5 });
                hint = 'Подсказка: function add(a, b) { return a + b; }';
            } else if (currentLanguage === 'new') {
                passed = /function\s+buildPrompt\s*\(|(?:const|let)\s+buildPrompt\s*=/.test(code) &&
                    /return/.test(code) &&
                    runJavaScriptChallenge(code, 'buildPrompt', { args: '"тест"', value: 'Задача: тест' });
                hint = 'Подсказка: function buildPrompt(task) { return "Задача: " + task; }';
            } else if (currentLanguage === 'python') {
                passed = /def\s+add\s*\(\s*a\s*,\s*b\s*\)\s*:/.test(code) && /return/.test(code) && /\+/.test(code);
                hint = 'Подсказка: def add(a, b): return a + b';
            } else if (currentLanguage === 'web') {
                passed = /<button[\s>]/i.test(code) && /:hover/.test(code) && /(padding|background|border-radius)/.test(code);
                hint = 'Подсказка: добави <button> и CSS правило button:hover { ... }';
            } else if (currentLanguage === 'swift') {
                passed = /func\s+greet\s*\(/.test(code) && /name\s*:/.test(code) && /print\s*\(/.test(code);
                hint = 'Подсказка: func greet(name: String) { print("Здравей, \\(name)") }';
            } else if (currentLanguage === 'backend') {
                passed = /fetch\s*\(/.test(code) && /\/api\/test/.test(code) && /(\.json\s*\(|await)/.test(code);
                hint = 'Подсказка: const res = await fetch("/api/test"); const data = await res.json();';
            }

            feedback.className = `challenge-feedback ${passed ? 'success' : 'error'}`;
            feedback.textContent = passed
                ? '✅ Браво! Задачата мина успешно. Можеш да завършиш урока за XP.'
                : `❌ Почти. ${hint}`;
        }

        function renderMentorCard(lesson) {
            const placeholder = `Например: Обясни ми ${lesson.title.replace(/["']/g, '')} по-просто`;
            return `
                <div class="learning-widget" id="mentor-card">
                    <div class="learning-widget-title">
                        <span>🤖 AI Mentor</span>
                        <span class="learning-widget-badge">lesson help</span>
                    </div>
                    <p class="challenge-prompt">Попитай за този урок: обяснение, пример, грешка в кода или следваща стъпка.</p>
                    <textarea class="mentor-input" id="mentor-question" placeholder="${escapeHtml(placeholder)}"></textarea>
                    <div class="mentor-actions">
                        <button class="mentor-btn" onclick="askMentor()">Попитай AI</button>
                    </div>
                    <div class="mentor-answer" id="mentor-answer"></div>
                </div>
            `;
        }

        function askMentor() {
            const questionEl = document.getElementById('mentor-question');
            const answerEl = document.getElementById('mentor-answer');
            if (!questionEl || !answerEl || !currentLesson) return;

            const lesson = getLessons()[currentLesson];
            const question = questionEl.value.trim().toLowerCase();
            let answer = `За този урок мисли така: ${lesson.description}`;

            if (!question) {
                answer = 'Напиши въпрос, например: "Обясни ми по-просто", "Дай ми пример" или "Защо кодът не работи".';
            } else if (question.includes('пример')) {
                answer = `Мини пример: отвори "Зареди пример", промени една малка част от кода и натисни "Изпълни код". Така виждаш веднага как ${lesson.title} влияе на резултата.`;
            } else if (question.includes('греш') || question.includes('не работ')) {
                answer = 'Провери 3 неща: дали скобите са затворени, дали имената са написани еднакво, и дали гледаш резултата в правилния панел. После стартирай кода пак.';
            } else if (question.includes('просто') || question.includes('обясни')) {
                answer = `${lesson.title} накратко: взимаш една идея, пишеш малък пример, пускаш го и наблюдаваш какво се променя. Не учи всичко наведнъж, тествай една промяна.`;
            } else if (question.includes('следва')) {
                answer = 'Следваща стъпка: реши interactive challenge-а, после завърши урока за XP. Ако мине лесно, промени примера и го направи свой.';
            }

            answerEl.textContent = `🤖 ${answer}`;
        }

        function continueLearning() {
            const state = loadLastLessonState();
            const lang = state.lang && topicsByLanguage[state.lang] ? state.lang : currentLanguage;
            let lessonId = state.lang === lang ? state.lessonId : getLastLessonForLanguage(lang);

            if (!lessonId || !topicsByLanguage[lang]?.some(topic => topic.id === lessonId) || !isLessonUnlocked(lang, lessonId)) {
                lessonId = getFirstUnlockedLessonId(lang);
            }

            if (!lessonId) return;
            setLanguageChrome(lang);
            loadLesson(lessonId, document.querySelector(`[data-lesson-id="${lessonId}"]`));
        }

        function startLearningFlow() {
            const state = loadLastLessonState();
            const lang = state.lang && topicsByLanguage[state.lang] ? state.lang : 'javascript';
            let lessonId = state.lessonId;

            if (!lessonId || !topicsByLanguage[lang]?.some(topic => topic.id === lessonId) || !isLessonUnlocked(lang, lessonId)) {
                lessonId = getLastLessonForLanguage(lang) || getFirstUnlockedLessonId(lang);
            }

            setLanguageChrome(lang);
            if (lessonId) {
                loadLesson(lessonId, document.querySelector(`[data-lesson-id="${lessonId}"]`));
            }
        }

        function getLanguageForPath(path) {
            return {
                frontend: 'web',
                backend: 'backend',
                fullstack: 'javascript',
                ai: 'new'
            }[path] || 'javascript';
        }

        function hideOnboarding() {
            document.getElementById('onboarding-overlay')?.classList.remove('visible');
        }

        function showOnboardingIfNeeded() {
            if (localStorage.getItem(ONBOARDING_STORAGE_KEY)) return;
            document.getElementById('onboarding-overlay')?.classList.add('visible');
        }

        function skipOnboarding() {
            localStorage.setItem(ONBOARDING_STORAGE_KEY, JSON.stringify({
                path: 'skipped',
                selectedAt: new Date().toISOString()
            }));
            hideOnboarding();
        }

        function chooseLearningPath(path) {
            const lang = getLanguageForPath(path);
            const lessonId = getFirstUnlockedLessonId(lang);
            localStorage.setItem(ONBOARDING_STORAGE_KEY, JSON.stringify({
                path,
                lang,
                selectedAt: new Date().toISOString()
            }));
            hideOnboarding();
            setLanguageChrome(lang);
            if (lessonId) {
                loadLesson(lessonId, document.querySelector(`[data-lesson-id="${lessonId}"]`));
            }
        }

        function initEditor() {
            editor = CodeMirror.fromTextArea(document.getElementById('code-editor'), {
                lineNumbers: true,
                mode: 'javascript',
                theme: 'monokai',
                autoCloseBrackets: true,
                matchBrackets: true,
                styleActiveLine: true,
                indentUnit: 4,
                tabSize: 4,
                lineWrapping: true
            });
            editor.setOption("extraKeys", {
                "Ctrl-Enter": function() { runCode(); }
            });
            editor.setValue(defaultCodeByLanguage.javascript);
        }

        function switchLanguage(lang) {
            currentLesson = null;
            setLanguageChrome(lang);
            const lessonId = getLastLessonForLanguage(lang) || getFirstUnlockedLessonId(lang);
            if (lessonId) {
                loadLesson(lessonId, document.querySelector(`[data-lesson-id="${lessonId}"]`));
            }
        }

        function renderTopicsList() {
            const list = document.getElementById('lessons-list');
            const topics = topicsByLanguage[currentLanguage];
            if (!list || !topics) return;
            list.innerHTML = topics.map(t => {
                const locked = !isLessonUnlocked(currentLanguage, t.id);
                const completed = isLessonCompleted(currentLanguage, t.id);
                const statusIcon = completed ? ' ✅' : locked ? ' 🔒' : '';
                const className = [
                    'lesson-item',
                    currentLesson === t.id ? 'active' : '',
                    locked ? 'locked' : '',
                    completed ? 'completed' : ''
                ].filter(Boolean).join(' ');
                return `<div class="${className}" data-lesson-id="${t.id}" onclick="loadLesson('${t.id}', this)" title="${locked ? 'Завърши предишния урок, за да отключиш този.' : ''}">${t.label}${statusIcon}</div>`;
            }).join('');
            renderProgressPanel();
        }

        function runCode() {
            const code = editor.getValue();
            clearOutput();
            if (currentLanguage === 'web') {
                runWebCode(code);
            } else if (currentLanguage === 'python') {
                setPreviewVisible(false);
                runPythonCode(code);
            } else if (currentLanguage === 'swift') {
                setPreviewVisible(false);
                runSwiftCode(code);
            } else if (currentLanguage === 'backend') {
                setPreviewVisible(false);
                runBackendCode(code);
            } else {
                setPreviewVisible(false);
                runJavaScriptCode(code);
            }
        }

        function runWebCode(code) {
            setPreviewVisible(true);
            let html = code.trim();
            if (!html.includes('<html') && !html.includes('<!DOCTYPE')) {
                if (html.includes('{') && (html.includes('color') || html.includes('background') || html.includes('font'))) {
                    html = `<!DOCTYPE html><html lang="bg"><head><meta charset="UTF-8"><style>${html}</style></head><body><p>Примерен текст за стилове.</p></body></html>`;
                } else {
                    html = `<!DOCTYPE html><html lang="bg"><head><meta charset="UTF-8"></head><body>${html}</body></html>`;
                }
            }
            const iframe = document.getElementById('html-preview');
            iframe.srcdoc = html;
            displayOutput('Визуалният преглед е обновен по-горе.', 'success');
            if (html.includes('<script')) {
                displayOutput('Внимание: script тагове в preview са ограничени (sandbox).', 'success');
            }
        }

        function runBackendCode(code) {
            displayOutput('ℹ️ Backend: fetch и console работят тук. require, fs, Express сървър – в терминал: node server.js или npm run dev', 'success');
            if (/require\s*\(\s*['"]fs['"]/.test(code) || /require\s*\(\s*['"]http['"]/.test(code)) {
                displayOutput('⚠️ require("fs") / require("http") не работят в браузъра – виж кода в server.js и пусни npm start', 'error');
            }
            runJavaScriptCode(code);
        }

        function runSwiftCode(code) {
            displayOutput('ℹ️ Swift се компилира в Xcode или Swift Playgrounds. По-долу: симулация на print() редове.', 'success');
            const lines = code.split('\n');
            let found = false;
            const printRegex = /print\s*\(\s*"((?:[^"\\]|\\.)*)"\s*\)/g;
            const printRegex2 = /print\s*\(\s*'((?:[^'\\]|\\.)*)'\s*\)/g;
            for (const line of lines) {
                let m;
                while ((m = printRegex.exec(line)) !== null) {
                    displayOutput(m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"'), 'success');
                    found = true;
                }
                while ((m = printRegex2.exec(line)) !== null) {
                    displayOutput(m[1], 'success');
                    found = true;
                }
                const printNum = line.match(/print\s*\(\s*([^")]+)\s*\)/);
                if (printNum && !line.includes('"') && !line.includes("'")) {
                    const expr = printNum[1].trim();
                    if (/^-?\d+(\.\d+)?$/.test(expr)) {
                        displayOutput(expr, 'success');
                        found = true;
                    }
                }
            }
            if (!found) {
                displayOutput('Няма разпознати print("...") редове. Копирай кода в Xcode → File → New → Playground.', 'success');
            }
        }

        function runJavaScriptCode(code) {
            const originalLog = console.log;
            const originalError = console.error;
            console.log = function(...args) {
                originalLog.apply(console, args);
                displayOutput(args.map(arg =>
                    typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                ).join(' '), 'success');
            };
            console.error = function(...args) {
                originalError.apply(console, args);
                displayOutput(args.join(' '), 'error');
            };
            try {
                eval(code);
            } catch (error) {
                displayOutput('Грешка: ' + error.message, 'error');
            } finally {
                console.log = originalLog;
                console.error = originalError;
            }
        }

        function runPythonCode(code) {
            if (typeof Skulpt === 'undefined') {
                displayOutput('Python библиотеката не е заредена. Презареди страницата.', 'error');
                return;
            }
            function outf(text) {
                if (text !== undefined && text !== null && String(text).trim() !== '') {
                    displayOutput(String(text).replace(/\n$/, ''), 'success');
                }
            }
            function builtinRead(x) {
                if (Skulpt.builtinFiles === undefined || Skulpt.builtinFiles["files"][x] === undefined) {
                    throw "File not found: '" + x + "'";
                }
                return Skulpt.builtinFiles["files"][x];
            }
            Sk.configure({
                output: outf,
                read: builtinRead,
                __future__: Sk.python3
            });
            try {
                Sk.importMainWithBody("<stdin>", false, code, true);
            } catch (e) {
                const msg = e.toString ? e.toString() : String(e);
                displayOutput('Грешка: ' + msg, 'error');
            }
        }

        function clearEditor() {
            if (confirm('Сигурен ли си, че искаш да изчистиш кода?')) {
                editor.setValue('');
            }
        }

        function loadExample() {
            const lessons = getLessons();
            if (currentLesson && lessons[currentLesson] && lessons[currentLesson].code) {
                editor.setValue(lessons[currentLesson].code);
            } else {
                alert('Първо избери урок от списъка отляво!');
            }
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            if (currentLanguage !== 'web') {
                setPreviewVisible(false);
            }
        }

        function displayOutput(text, type) {
            const output = document.getElementById('output');
            const p = document.createElement('p');
            p.textContent = text;
            if (type) p.classList.add(type);
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadLesson(lessonId, element, options = {}) {
            if (!isLessonUnlocked(currentLanguage, lessonId)) {
                displayOutput('🔒 Този урок е заключен. Завърши предишния урок, за да го отключиш.', 'error');
                return;
            }

            currentLesson = lessonId;
            saveLastLessonState(currentLanguage, lessonId);
            document.querySelectorAll('.lesson-item').forEach(item => item.classList.remove('active'));
            if (element) element.classList.add('active');

            const lesson = getLessons()[lessonId];
            if (!lesson) return;

            if (!options.skipEditorReset) {
                if (editor) {
                    editor.setOption('mode', getEditorMode(currentLanguage));
                    editor.setValue(lesson.code || defaultCodeByLanguage[currentLanguage] || '');
                } else {
                    document.getElementById('code-editor').value = lesson.code || defaultCodeByLanguage[currentLanguage] || '';
                }
            }

            const codeEscaped = escapeHtml(lesson.code || '');
            const langName = getLanguageDisplayName(currentLanguage);
            const completed = isLessonCompleted(currentLanguage, lessonId);
            const readingMaterial = document.getElementById('reading-material');
            readingMaterial.classList.remove('lesson-transition');
            void readingMaterial.offsetWidth;
            readingMaterial.classList.add('lesson-transition');
            readingMaterial.innerHTML = `
                <div class="read-category">${escapeHtml(lesson.category)}</div>
                <h1 class="read-title">${escapeHtml(lesson.title)}</h1>
                <p class="read-lead">${escapeHtml(lesson.description)}</p>
                ${lesson.detailedExplanation || ''}
                <div class="read-section">
                    <h3>📌 Примерен код (${langName})</h3>
                    <p>Натисни „Зареди пример” по-долу, редактирай и „Изпълни код”.</p>
                    <pre class="read-code-block">${codeEscaped}</pre>
                </div>
                ${renderChallengeCard()}
                ${renderMentorCard(lesson)}
                <div class="read-next-step">
                    <strong>🎯 Следваща стъпка:</strong> Зареди примера в редактора и изпълни го. Резултатите са в „Резултати от изпълнението”.
                    <br>
                    <button class="complete-lesson-btn ${completed ? 'done' : ''}" onclick="completeCurrentLesson()" ${completed ? 'disabled' : ''}>
                        ${completed ? '✅ Урокът е завършен' : '🏁 Завърши урока +25 XP'}
                    </button>
                </div>`;
            readingMaterial.scrollTop = 0;
            renderTopicsList();
            renderProgressPanel();
            updateAcademyHeader();
        }

        document.addEventListener('DOMContentLoaded', function() {
            try {
                initEditor();
            } catch (error) {
                console.warn('Code editor did not initialize:', error);
                document.getElementById('code-editor').value = defaultCodeByLanguage.javascript;
            }
            startLearningFlow();
            showOnboardingIfNeeded();
        });
    </script>
</body>
</html>
