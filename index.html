    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background:
                radial-gradient(circle at 18% 12%, rgba(45, 212, 191, 0.18), transparent 28%),
                radial-gradient(circle at 82% 10%, rgba(129, 140, 248, 0.2), transparent 32%),
                linear-gradient(135deg, #020617 0%, #0f172a 48%, #111827 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #e5e7eb;
            letter-spacing: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        .main-container {
            max-width: 100%;
            margin: 0;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            min-height: 100vh;
        }

        /* Лява страна – само теми */
        .left-panel {
            display: flex;
            flex-direction: column;
            background:
                linear-gradient(180deg, rgba(17, 24, 39, 0.96), rgba(37, 47, 64, 0.94)),
                linear-gradient(135deg, rgba(20, 184, 166, 0.16), rgba(99, 102, 241, 0.12));
            color: white;
            overflow: hidden;
            border-right: 1px solid rgba(255,255,255,0.18);
            box-shadow: 18px 0 45px rgba(15, 23, 42, 0.16);
            min-height: 0;
            backdrop-filter: blur(18px);
        }

        .right-panel {
            display: flex;
            flex-direction: column;
            background: rgba(15, 23, 42, 0.76);
            overflow: hidden;
        }

        .panel-header {
            background: linear-gradient(135deg, #4f46e5 0%, #0891b2 100%);
            color: white;
            padding: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 0;
        }

        .left-panel .panel-header {
            background: rgba(15, 23, 42, 0.62);
            border-bottom: 1px solid rgba(255,255,255,0.12);
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.04);
        }

        .panel-content {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 20px;
        }

        .left-panel .panel-content {
            padding: 12px;
        }

        .code-editor-wrapper {
            flex-shrink: 0;
            margin: 0 24px 20px;
            background: rgba(15, 23, 42, 0.72);
            border-radius: 14px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.22);
            backdrop-filter: blur(18px);
            transition: transform 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
        }

        .code-editor-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 58px rgba(15, 23, 42, 0.15);
            border-color: rgba(99, 102, 241, 0.28);
        }

        .code-editor-container {
            display: flex;
            flex-direction: column;
            min-height: 260px;
        }

        .editor-toolbar {
            background: rgba(15, 23, 42, 0.86);
            padding: 12px 16px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }

        .editor-btn {
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 800;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            min-height: 38px;
            line-height: 1.25;
            text-align: center;
            white-space: normal;
            overflow-wrap: anywhere;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .editor-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 14px 26px rgba(79, 70, 229, 0.25);
        }

        .editor-btn.secondary {
            background: linear-gradient(135deg, #64748b, #475569);
            box-shadow: 0 10px 18px rgba(71, 85, 105, 0.18);
        }

        .editor-btn.secondary:hover {
            filter: brightness(1.05);
        }

        .editor-btn.success {
            background: linear-gradient(135deg, #16a34a, #0d9488);
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
        }

        .editor-btn.success:hover {
            filter: brightness(1.05);
        }

        .CodeMirror {
            height: 260px !important;
            font-size: 14px;
            border: none;
            border-radius: 0 0 8px 8px;
        }

        .right-panel .panel-header {
            background: rgba(15, 23, 42, 0.78);
            color: #f8fafc;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            backdrop-filter: blur(18px);
            justify-content: space-between;
            gap: 18px;
            padding: 18px 24px;
        }

        .academy-heading {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 0;
        }

        .academy-icon {
            display: grid;
            place-items: center;
            width: 44px;
            height: 44px;
            flex: 0 0 auto;
            border-radius: 14px;
            background: linear-gradient(135deg, #4f46e5, #14b8a6);
            color: white;
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
        }

        .academy-kicker {
            margin-bottom: 2px;
            color: #94a3b8;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .academy-title {
            color: #f8fafc;
            font-size: 1.15rem;
            font-weight: 950;
            line-height: 1.15;
        }

        .academy-subtitle {
            margin-top: 2px;
            color: #cbd5e1;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .academy-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .academy-stat {
            padding: 9px 12px;
            border-radius: 999px;
            color: #e2e8f0;
            background: rgba(30, 41, 59, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.24);
            font-size: 0.78rem;
            font-weight: 900;
            box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
        }

        .continue-btn {
            border: none;
            border-radius: 999px;
            padding: 11px 16px;
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            font-size: 0.9rem;
            font-weight: 950;
            cursor: pointer;
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .admin-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 42px;
            padding: 10px 14px;
            border-radius: 999px;
            color: #e2e8f0;
            background: rgba(30, 41, 59, 0.72);
            border: 1px solid rgba(148, 163, 184, 0.24);
            font-size: 0.84rem;
            font-weight: 950;
            text-decoration: none;
            transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .admin-link:hover {
            transform: translateY(-2px);
            border-color: rgba(20, 184, 166, 0.42);
            background: rgba(51, 65, 85, 0.82);
        }

        .continue-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.04);
            box-shadow: 0 18px 34px rgba(79, 70, 229, 0.28);
        }

        .lesson-transition {
            animation: lessonEnter 0.34s ease both;
        }

        @keyframes lessonEnter {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #output {
            flex: 1;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            line-height: 1.6;
        }

        /* Дясно поле – материал за четене */
        .reading-panel {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        #reading-material {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 32px 40px;
            font-size: 1.12rem;
            line-height: 1.85;
            color: #e2e8f0;
        }

        #reading-material .read-welcome {
            text-align: center;
            padding: 64px 24px;
            color: #cbd5e1;
            max-width: 820px;
            margin: 34px auto;
            background: rgba(15, 23, 42, 0.66);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(20px);
        }

        #reading-material .read-welcome h2 {
            color: #334155;
            font-size: 1.9rem;
            font-weight: 900;
            margin-bottom: 18px;
            background: linear-gradient(135deg, #4f46e5, #0891b2 60%, #0f766e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        #reading-material .read-welcome p {
            margin: 12px 0;
            max-width: 620px;
            margin-left: auto;
            margin-right: auto;
            font-size: 1.22rem;
            line-height: 1.65;
        }

        #reading-material .read-category {
            display: inline-block;
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 16px;
            box-shadow: 0 10px 24px rgba(79, 70, 229, 0.2);
        }

        #reading-material .read-title {
            color: #f8fafc;
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 16px;
            line-height: 1.3;
        }

        #reading-material .read-lead {
            color: #cbd5e1;
            font-size: 1.25rem;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.22);
        }

        #reading-material .read-section {
            margin-bottom: 24px;
        }

        #reading-material .read-section h3 {
            color: #4f46e5;
            font-size: 1.35rem;
            font-weight: 850;
            margin-bottom: 10px;
        }

        #reading-material .read-section p {
            margin: 8px 0;
            color: #d1d5db;
            font-size: 1.13rem;
        }

        #reading-material .read-code-block {
            background: linear-gradient(135deg, #111827, #1f2937);
            color: #e5e7eb;
            padding: 18px 20px;
            border-radius: 14px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-left: 4px solid #14b8a6;
            white-space: pre;
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.18);
        }

        #reading-material .read-tip {
            background: rgba(14, 116, 144, 0.14);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #2196f3;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
        }

        #reading-material .read-tip strong {
            color: #1565c0;
        }

        #reading-material .read-warn {
            background: rgba(245, 158, 11, 0.13);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #ff9800;
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.1);
        }

        #reading-material .read-warn strong {
            color: #e65100;
        }

        #reading-material .read-next-step {
            background: rgba(22, 163, 74, 0.13);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 20px 0;
            border-left: 4px solid #28a745;
            box-shadow: 0 12px 30px rgba(22, 163, 74, 0.1);
        }

        #reading-material .read-next-step strong {
            color: #1b5e20;
        }

        #reading-material .lesson-section {
            margin-bottom: 20px;
            padding: 18px 20px;
            background: rgba(15, 23, 42, 0.62);
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 16px;
            box-shadow: 0 14px 36px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(16px);
            transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        #reading-material .lesson-section:hover {
            transform: translateY(-2px);
            border-color: rgba(20, 184, 166, 0.24);
            box-shadow: 0 20px 48px rgba(15, 23, 42, 0.12);
        }

        #reading-material .lesson-section-title {
            color: #4f46e5;
            font-size: 1.32rem;
            font-weight: 850;
            margin-bottom: 8px;
        }

        #reading-material .lesson-section-description {
            color: #d1d5db;
            font-size: 1.13rem;
            line-height: 1.8;
        }

        #reading-material .tip-box {
            background: rgba(14, 116, 144, 0.14);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #2196f3;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.08);
        }

        #reading-material .tip-box strong {
            color: #1565c0;
        }

        #reading-material .warning-box {
            background: rgba(245, 158, 11, 0.13);
            padding: 14px 18px;
            border-radius: 14px;
            margin: 16px 0;
            border-left: 4px solid #ff9800;
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.1);
        }

        #reading-material .warning-box strong {
            color: #e65100;
        }

        .output-section {
            flex-shrink: 0;
            margin: 0 24px 24px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.22);
            background: rgba(15, 23, 42, 0.72);
            box-shadow: 0 18px 42px rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(18px);
        }

        .output-section-title {
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 800;
            color: #cbd5e1;
            background: rgba(15, 23, 42, 0.86);
        }

        #output {
            min-height: 120px;
            max-height: 200px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 12px 16px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        #output:empty::before {
            content: 'Резултатите от „Изпълни код” ще се появят тук.';
            color: #666;
        }

        #output p {
            margin: 4px 0;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.06);
            border-left: 3px solid #667eea;
            border-radius: 2px;
        }

        #output .error {
            color: #f48771;
            border-left-color: #f48771;
        }

        #output .success {
            color: #4ec9b0;
            border-left-color: #4ec9b0;
        }

        .lessons-sidebar {
            background: transparent;
            padding: 0;
        }

        .language-switcher {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 14px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.035);
        }

        .lang-btn {
            min-width: 0;
            min-height: 42px;
            padding: 9px 10px;
            font-size: 0.8rem;
            line-height: 1.15;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.85);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
            text-align: center;
            white-space: normal;
            overflow-wrap: anywhere;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .lang-btn.web {
            grid-column: 1 / -1;
        }

        .lang-btn.new {
            grid-column: 1 / -1;
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.16);
            border-color: rgba(255,255,255,0.18);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #4f46e5, #0891b2);
            color: white;
            border-color: rgba(255,255,255,0.22);
            box-shadow: 0 14px 28px rgba(79, 70, 229, 0.22);
        }

        .lang-btn.js.active {
            background: linear-gradient(135deg, #fde047, #f59e0b);
            color: #333;
        }

        .lang-btn.py.active {
            background: linear-gradient(135deg, #2563eb, #0891b2);
            color: white;
        }

        .lang-btn.swift.active {
            background: linear-gradient(135deg, #f97316, #ef4444);
            color: white;
        }

        .lang-btn.backend.active {
            background: linear-gradient(135deg, #16a34a, #0d9488);
            color: white;
        }

        .lang-btn.web.active {
            background: linear-gradient(135deg, #f97316, #dc2626);
            color: white;
        }

        .lang-btn.new.active {
            background: linear-gradient(135deg, #8b5cf6, #06b6d4);
            color: white;
        }

        #html-preview-wrap {
            display: none;
            flex-shrink: 0;
            margin: 0 24px 12px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            background: white;
        }

        #html-preview-wrap.visible {
            display: block;
        }

        #html-preview-wrap .preview-label {
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            background: #f0f0f0;
            border-bottom: 1px solid #e0e0e0;
        }

        #html-preview {
            width: 100%;
            height: 280px;
            border: none;
            display: block;
        }

        .lessons-title {
            font-size: 0.75rem;
            font-weight: 800;
            color: rgba(255,255,255,0.56);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            padding: 0 8px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .progress-panel {
            margin: 0 0 14px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 16px 36px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
        }

        .progress-topline {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            color: rgba(255,255,255,0.92);
            font-size: 0.78rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .progress-track {
            height: 10px;
            overflow: hidden;
            border-radius: 999px;
            background: rgba(255,255,255,0.13);
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.18);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #22c55e, #14b8a6, #6366f1);
            box-shadow: 0 0 18px rgba(20, 184, 166, 0.45);
            transition: width 0.35s ease;
        }

        .progress-meta {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 6px;
            margin-top: 12px;
        }

        .progress-chip {
            padding: 7px 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.88);
            font-size: 0.72rem;
            font-weight: 800;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .lesson-item {
            background: rgba(255,255,255,0.02);
            color: rgba(255,255,255,0.9);
            padding: 12px 14px;
            margin-bottom: 6px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 0.95rem;
            line-height: 1.35;
            overflow-wrap: anywhere;
        }

        .lesson-item.locked {
            cursor: not-allowed;
            color: rgba(255,255,255,0.38);
            background: rgba(255,255,255,0.015);
        }

        .lesson-item.locked:hover {
            transform: none;
            box-shadow: none;
            border-left-color: transparent;

                    </div>
                </div>
                <div class="academy-actions">
                    <div class="academy-stat" id="academy-xp-stat">0 XP</div>
                    <div class="academy-stat" id="academy-level-stat">Ниво 1</div>
                    <a class="admin-link" href="/admin">Admin</a>
                    <button class="continue-btn" type="button" onclick="continueLearning()">Продължи</button>
                </div>
            </div>
            <div class="reading-panel">
                <div id="reading-material"></div>

                <div class="code-editor-wrapper" id="lessonEditorSection">
                    <div class="editor-toolbar">
                        <button class="editor-btn success" onclick="runCode()">▶️ Изпълни код</button>
                        <button class="editor-btn secondary" onclick="clearEditor()">🗑️ Изчисти</button>
                        <button class="editor-btn secondary" onclick="loadExample()">📋 Зареди пример</button>
                    </div>
                    <div class="code-editor-container">
                        <textarea id="code-editor"></textarea>
                    </div>
                </div>

                <div id="html-preview-wrap">
                    <div class="preview-label">Визуален преглед (HTML/CSS)</div>
                    <iframe id="html-preview" title="HTML preview" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>

                <div class="output-section">
                    <div class="output-section-title">Резултати / съобщения</div>
                    <div id="output"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="onboarding-overlay" id="onboarding-overlay" aria-modal="true" role="dialog" aria-labelledby="onboarding-title">
        <div class="onboarding-panel">
            <div class="onboarding-head">
                <div>
                    <h2 class="onboarding-title" id="onboarding-title">Избери своята пътека</h2>
                    <p class="onboarding-copy">Ще ти предложим подходящ старт според това, което искаш да учиш първо.</p>
                </div>
                <button class="onboarding-skip" type="button" onclick="skipOnboarding()">Пропусни</button>
            </div>
            <div class="path-grid">
                <button class="path-card" type="button" onclick="chooseLearningPath('frontend')">
                    <span class="path-icon">🎨</span>
                    <span class="path-name">Frontend</span>
                    <span class="path-desc">HTML, CSS, JavaScript и интерфейси.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('backend')">
                    <span class="path-icon">🛠️</span>
                    <span class="path-name">Backend</span>
                    <span class="path-desc">Node.js, API, routes и server логика.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('fullstack')">
                    <span class="path-icon">🚀</span>
                    <span class="path-name">Full-Stack</span>
                    <span class="path-desc">Пълен път от основи до проект.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('ai')">
                    <span class="path-icon">🤖</span>
                    <span class="path-name">AI</span>
                    <span class="path-desc">AI инструменти, prompt-и, тестове и работен процес.</span>
                </button>
                <button class="path-card" type="button" onclick="chooseLearningPath('frontend')">
                    <span class="path-icon">📱</span>
                    <span class="path-name">Мобилни приложения</span>
                    <span class="path-desc">Responsive интерфейси и удобни екрани за телефон.</span>
                </button>
            </div>
        </div>
    </div>
    <div class="app-toast" id="appToast" role="status" aria-live="polite"></div>

    <!-- CodeMirror JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <!-- Skulpt – изпълнение на Python в браузъра -->
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/selection/active-line.min.js"></script>

    <script src="/script.js"></script>
    <script src="/lessons-python.js"></script>
    <script src="/lessons-js-more.js"></script>
    <script src="/lessons-python-more.js"></script>
    <script src="/lessons-swift.js"></script>
    <script src="/lessons-backend.js"></script>
    <script src="/lessons-web.js"></script>
    <script src="/lessons-new.js"></script>
    <script src="/supabase.js"></script>
    <script>
        let currentLanguage = 'javascript';
        let currentLesson = null;
        let editor;
        const PROGRESS_STORAGE_KEY = 'learningEnvironmentProgressV1';
        const LAST_LESSON_STORAGE_KEY = 'learningEnvironmentLastLessonV1';
        const ONBOARDING_STORAGE_KEY = 'learningEnvironmentOnboardingV1';

        function getLessons() {
            if (currentLanguage === 'python') return lessonsPython;
            if (currentLanguage === 'swift') return lessonsSwift;
            if (currentLanguage === 'backend') return lessonsBackend;
            if (currentLanguage === 'web') return lessonsWeb;
            if (currentLanguage === 'new') return lessonsNew;
            return lessonsJS;
        }

        function getLessonMapForLanguage(lang) {
            if (lang === 'python') return lessonsPython;
            if (lang === 'swift') return lessonsSwift;
            if (lang === 'backend') return lessonsBackend;
            if (lang === 'web') return lessonsWeb;
            if (lang === 'new') return lessonsNew;
            return lessonsJS;
        }

        function getEditorMode(lang) {
            if (lang === 'python') return 'python';
            if (lang === 'web') return 'htmlmixed';
            if (lang === 'swift') return { name: 'clike', keywords: { 'let': true, 'var': true, 'func': true, 'struct': true, 'class': true, 'enum': true, 'protocol': true, 'extension': true, 'import': true, 'guard': true, 'return': true, 'if': true, 'else': true, 'switch': true, 'case': true, 'default': true, 'for': true, 'while': true, 'in': true, 'true': true, 'false': true, 'nil': true, 'print': true } };
            return 'javascript';
        }

        function getLanguageDisplayName(lang) {
            return {
                javascript: 'JavaScript',
                python: 'Python',
                swift: 'Swift',
                backend: 'Backend (Node.js & Next.js)',
                web: 'HTML & CSS',
                new: 'AI & Tools'
            }[lang] || lang;
        }

        function setPreviewVisible(show) {
            document.getElementById('html-preview-wrap').classList.toggle('visible', show);
        }

        function loadProgress() {
            try {
                return JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY)) || { completed: {} };
            } catch (error) {
                return { completed: {} };
            }
        }

        function saveProgress(progress) {
            localStorage.setItem(PROGRESS_STORAGE_KEY, JSON.stringify(progress));
        }

        function loadLastLessonState() {
            try {
                return JSON.parse(localStorage.getItem(LAST_LESSON_STORAGE_KEY)) || {};
            } catch (error) {
                return {};
            }
        }

        function saveLastLessonState(lang, lessonId) {
            const state = loadLastLessonState();
            state.lang = lang;
            state.lessonId = lessonId;
            state.byLanguage = state.byLanguage || {};
            state.byLanguage[lang] = lessonId;
            localStorage.setItem(LAST_LESSON_STORAGE_KEY, JSON.stringify(state));
        }

        function getLessonProgressKey(lang, lessonId) {
            return `${lang}:${lessonId}`;
        }

        function isLessonCompleted(lang, lessonId) {
            const progress = loadProgress();
            return Boolean(progress.completed[getLessonProgressKey(lang, lessonId)]);
        }

        function getCompletedCount(lang) {
            const topics = topicsByLanguage[lang] || [];
            return topics.filter(topic => isLessonCompleted(lang, topic.id)).length;
        }

        function getTotalCompletedCount() {
            return Object.keys(topicsByLanguage).reduce((sum, lang) => sum + getCompletedCount(lang), 0);
        }

        function getLevelFromXp(xp) {
            return Math.floor(xp / 100) + 1;
        }

        function getTotalLessonCount() {
            return Object.keys(topicsByLanguage).reduce((sum, lang) => sum + (topicsByLanguage[lang]?.length || 0), 0);
        }

        function getXpToNextLevel(xp) {
            const remainder = xp % 100;
            return remainder === 0 ? 100 : 100 - remainder;
        }

        function isLessonUnlocked(lang, lessonId) {
            const topics = topicsByLanguage[lang] || [];
            const index = topics.findIndex(topic => topic.id === lessonId);
            if (index <= 0) return true;
            return isLessonCompleted(lang, topics[index - 1].id);
        }

        function getFirstLessonId(lang) {
            return topicsByLanguage[lang]?.[0]?.id || null;
        }

        function getFirstUnlockedLessonId(lang) {
            const topics = topicsByLanguage[lang] || [];
            return topics.find(topic => isLessonUnlocked(lang, topic.id))?.id || getFirstLessonId(lang);
        }

        function getNextLessonId(lang, lessonId) {
            const topics = topicsByLanguage[lang] || [];
            const index = topics.findIndex(topic => topic.id === lessonId);
            if (index < 0 || index >= topics.length - 1) return null;
            return topics[index + 1].id;
        }

        function getLastLessonForLanguage(lang) {
            const state = loadLastLessonState();
            const lessonId = state.byLanguage?.[lang] || (state.lang === lang ? state.lessonId : null);
            if (lessonId && topicsByLanguage[lang]?.some(topic => topic.id === lessonId)) {
                return lessonId;
            }
            return null;
        }

        function getLessonElement(lessonId) {
            if (!lessonId) return null;
            const escapedId = window.CSS?.escape ? CSS.escape(lessonId) : lessonId.replace(/"/g, '\\"');
            return document.querySelector(`[data-lesson-id="${escapedId}"]`) ||
                [...document.querySelectorAll('.lesson-item')].find(item => item.dataset.lessonId === lessonId) ||
                null;
        }

        function openLessonForLanguage(lang, lessonId, options = {}) {
            const targetLessonId = lessonId || getFirstUnlockedLessonId(lang) || getFirstLessonId(lang);
            setLanguageChrome(lang);

            if (!targetLessonId) {
                renderEmptyLearningState();
                return;
            }

            loadLesson(targetLessonId, getLessonElement(targetLessonId), options);
        }

        function getPathIdForLanguage(lang) {
            if (lang === 'web') return 'frontend';
            if (lang === 'backend') return 'backend';
            if (lang === 'new') return 'ai';
            return 'fullstack';
        }

        function saveSelectedPath(path, lang) {
            localStorage.setItem(ONBOARDING_STORAGE_KEY, JSON.stringify({
                path,
                lang,
                selectedAt: new Date().toISOString()
            }));
        }

        function loadSelectedPathState() {
            try {
                return JSON.parse(localStorage.getItem(ONBOARDING_STORAGE_KEY)) || {};
            } catch (error) {
                return {};
            }
        }

        function showToast(message = 'Пътеката е заредена') {
            const toast = document.getElementById('appToast');
            if (!toast) return;
            toast.textContent = message;
            toast.classList.add('visible');
            clearTimeout(showToast.timeout);
            showToast.timeout = setTimeout(() => toast.classList.remove('visible'), 2200);
        }

        function scrollToSection(selector) {
            const target = document.querySelector(selector);
            if (!target) return;
            target.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'nearest' });
        }

        function setButtonFeedback(button) {
            if (!button) return;
            button.classList.add('is-pressed', 'is-loading');
            setTimeout(() => button.classList.remove('is-pressed'), 180);
            setTimeout(() => button.classList.remove('is-loading'), 520);
        }

        function refreshPathCardState() {
            const activePath = getActivePathId();
            document.querySelectorAll('.visual-path-card').forEach(card => {
                card.classList.toggle('active-path', card.dataset.path === activePath);
            });
        }

        function startCurrentPath(button = null) {
            setButtonFeedback(button);
            const path = getPathIdForLanguage(currentLanguage);
            const lang = getLanguageForPath(path);
            const lessonId = getFirstUnlockedLessonId(lang) || getFirstLessonId(lang);
            saveSelectedPath(path, lang);
            openLessonForLanguage(lang, lessonId, { forceUnlock: true });
            refreshPathCardState();
            showToast('Пътеката е заредена');
            setTimeout(() => scrollToSection('#lessonEditorSection'), 80);
        }

        function explorePathCards(button = null) {
            setButtonFeedback(button);
            scrollToSection('#learningPathCards');
        }

        function setLanguageChrome(lang) {
            currentLanguage = lang;

            document.getElementById('btn-lang-js').classList.toggle('active', lang === 'javascript');
            document.getElementById('btn-lang-py').classList.toggle('active', lang === 'python');
            document.getElementById('btn-lang-swift').classList.toggle('active', lang === 'swift');
            document.getElementById('btn-lang-backend').classList.toggle('active', lang === 'backend');
            document.getElementById('btn-lang-web').classList.toggle('active', lang === 'web');
            document.getElementById('btn-lang-new').classList.toggle('active', lang === 'new');

            const titles = {
                javascript: 'Уроци по JavaScript (18)',
                python: 'Уроци по Python (18)',
                swift: 'Уроци по Swift (19)',
                backend: 'Backend – Node & Next (19)',
                web: 'HTML & CSS (16)',
                new: 'AI & Tools (8)'
            };
            document.getElementById('lessons-sidebar-title').textContent = titles[lang];

            if (editor) {
                editor.setOption('mode', getEditorMode(lang));
                editor.setValue(defaultCodeByLanguage[lang] || '');
            } else {
                document.getElementById('code-editor').value = defaultCodeByLanguage[lang] || '';
            }

            setPreviewVisible(lang === 'web');
            renderTopicsList();
            renderProgressPanel();
            updateAcademyHeader();
        }

        function updateAcademyHeader() {
            const xp = getTotalCompletedCount() * 25;
            const level = getLevelFromXp(xp);
            const lesson = currentLesson ? getLessons()[currentLesson] : null;
            const completed = getCompletedCount(currentLanguage);
            const total = topicsByLanguage[currentLanguage]?.length || 0;

            const titleEl = document.getElementById('academy-current-title');
            const subtitleEl = document.getElementById('academy-current-subtitle');
            const xpEl = document.getElementById('academy-xp-stat');
            const levelEl = document.getElementById('academy-level-stat');

            if (titleEl) titleEl.textContent = lesson ? lesson.title.replace(/^[^\s]+\s*/, '') : 'Продължи своята пътека';
            if (subtitleEl) subtitleEl.textContent = `${getLanguageDisplayName(currentLanguage)} • ${completed}/${total} завършени урока`;
            if (xpEl) xpEl.textContent = `${xp} XP`;
            if (levelEl) levelEl.textContent = `Ниво ${level}`;
        }

        function renderProgressPanel() {
            const panel = document.getElementById('progress-panel');
            const topics = topicsByLanguage[currentLanguage] || [];
            if (!panel || !topics.length) return;

            const completed = getCompletedCount(currentLanguage);
            const total = topics.length;
            const percent = Math.round((completed / total) * 100);
            const xp = getTotalCompletedCount() * 25;
            const level = getLevelFromXp(xp);
            const nextXp = getXpToNextLevel(xp);

            panel.innerHTML = `
                <div class="progress-topline">
                    <span>Прогрес</span>
                    <span>${percent}%</span>
                </div>
                <div class="progress-track" aria-label="Прогрес ${percent}%">
                    <div class="progress-fill" style="width: ${percent}%"></div>
                </div>
                <div class="progress-meta">
                    <div class="progress-chip">${completed}/${total}</div>
                    <div class="progress-chip">${xp} XP</div>
                    <div class="progress-chip">Ниво ${level}</div>
                </div>
                <div class="progress-meta">
                    <div class="progress-chip">Следващи ${nextXp} XP</div>
                    <div class="progress-chip">${completed ? '🏅 Активно' : 'Старт'}</div>
                    <div class="progress-chip">${completed === total ? 'Завършено' : 'Отключи'}</div>
                </div>
            `;
            updateAcademyHeader();
        }

        function getTrackPercent(lang) {
            const topics = topicsByLanguage[lang] || [];
            if (!topics.length) return 0;
            return Math.round((getCompletedCount(lang) / topics.length) * 100);
        }

        function getPathDisplayName(lang) {
            return {
                javascript: 'JavaScript',
                python: 'Python',
                swift: 'Swift',
                backend: 'Backend',
                web: 'Frontend',
                new: 'AI & Tools'
            }[lang] || getLanguageDisplayName(lang);
        }

        function getNextRecommendedLesson() {
            const lessonId = getFirstUnlockedLessonId(currentLanguage);
            const lesson = lessonId ? getLessons()[lessonId] : null;
            return lesson ? lesson.title.replace(/^[^\s]+\s*/, '') : 'Избери пътека';
        }

        function getPathStats(id) {
            return {
                frontend: ['16 урока', 'Начинаещ', '4-6 часа'],
                backend: ['19 урока', 'Средно', '6-8 часа'],
                fullstack: ['37 урока', 'Средно+', '10-14 часа'],
                ai: ['8 урока', 'Леко', '2-3 часа'],
                mobile: ['16 урока', 'Начинаещ', '4-6 часа']
            }[id] || ['-', '-', '-'];
        }

        function getActivePathId() {
            const selected = loadSelectedPathState();
            if (selected.lang === currentLanguage && selected.path) {
                return selected.path;
            }
            return getPathIdForLanguage(currentLanguage);
        }

        function renderEngagementWidgets() {
            const completed = getTotalCompletedCount();
            const xp = completed * 25;
            const nextLesson = getNextRecommendedLesson();
            const dailyGoal = Math.min(100, Math.round((Math.min(completed, 3) / 3) * 100));
            return `
                <section class="engagement-grid" aria-label="Learning dashboard">
                    <div class="engagement-card">
                        <span class="engagement-icon">🎯</span>
                        <div class="engagement-label">Дневна цел</div>
                        <div class="engagement-value">${dailyGoal}%</div>
                        <div class="engagement-note">3 малки стъпки на ден</div>
                    </div>
                    <div class="engagement-card">
                        <span class="engagement-icon">🔥</span>
                        <div class="engagement-label">Streak</div>
                        <div class="engagement-value">${completed ? Math.min(7, completed) : 0} дни</div>
                        <div class="engagement-note">Локална мотивация</div>
                    </div>
                    <div class="engagement-card">
                        <span class="engagement-icon">✨</span>
                        <div class="engagement-label">XP спечелени</div>
                        <div class="engagement-value">${xp} XP</div>
                        <div class="engagement-note">Ниво ${getLevelFromXp(xp)}</div>
                    </div>
                    <div class="engagement-card">
                        <span class="engagement-icon">✅</span>
                        <div class="engagement-label">Завършени уроци</div>
                        <div class="engagement-value">${completed}/${getTotalLessonCount()}</div>
                        <div class="engagement-note">Общ прогрес</div>
                    </div>
                    <div class="engagement-card">
                        <span class="engagement-icon">➡️</span>
                        <div class="engagement-label">Следващ урок</div>
                        <div class="engagement-value">${escapeHtml(nextLesson)}</div>
                        <div class="engagement-note">Препоръчано продължение</div>
                    </div>
                </section>
            `;
        }

        function renderAcademyHero(lesson) {
            const completed = getTotalCompletedCount();
            const total = getTotalLessonCount();
            const percent = total ? Math.round((completed / total) * 100) : 0;
            const xp = completed * 25;
            const level = getLevelFromXp(xp);
            const trackPercent = getTrackPercent(currentLanguage);
            const currentTitle = lesson ? lesson.title.replace(/^[^\s]+\s*/, '') : getNextRecommendedLesson();
            return `
                <section class="academy-hero">
                    <div class="hero-content">
                        <div class="hero-kicker">Модерна интерактивна академия по програмиране</div>
                        <h2 class="hero-title">${lesson ? escapeHtml(lesson.title.replace(/^[^\s]+\s*/, '')) : 'Избери пътека и започни своето обучение'}</h2>
                        <p class="hero-copy">${lesson ? escapeHtml(lesson.description) : 'Избери посока, завършвай уроци, събирай XP и следвай roadmap от основи до готов SaaS проект.'}</p>
                        <div class="hero-metrics">
                            <div class="hero-metric"><strong>${getPathDisplayName(currentLanguage)}</strong><span>текуща пътека</span></div>
                            <div class="hero-metric"><strong>${trackPercent}%</strong><span>прогрес в пътеката</span></div>
                            <div class="hero-metric"><strong>Ниво ${level}</strong><span>${xp} XP</span></div>
                        </div>
                        <div class="hero-actions">
                            <button class="glow-btn" id="startPathBtn" type="button" data-action="start-path">Започни пътеката</button>
                            <button class="glow-btn" id="explorePathsBtn" type="button" data-action="explore-paths">Разгледай пътеки</button>
                        </div>
                    </div>
                    <div class="dashboard-visual" aria-hidden="true">
                        <div class="code-window">
                            <div class="window-bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
                            <div class="code-lines">
                                <span class="code-line long"></span>
                                <span class="code-line mid"></span>
                                <span class="code-line short"></span>
                                <span class="code-line long"></span>
                                <span class="code-line mid"></span>
                            </div>
                        </div>
                        <div class="floating-badge">Ниво ${level} • ${xp} XP</div>
                        <div class="chart-card">
                            <strong>${percent}% прогрес</strong>
                            <div class="mini-bars"><span></span><span></span><span></span><span></span></div>
                        </div>
                        <div class="continue-card">
                            <div>
                                <div class="continue-label">Продължи обучението</div>
                                <div class="continue-title">${escapeHtml(currentTitle)}</div>
                                <div class="continue-meta">${getPathDisplayName(currentLanguage)} • ${xp} XP • Ниво ${level}</div>
                            </div>
                            <div class="continue-ring" style="--progress: ${trackPercent}%"><span>${trackPercent}%</span></div>
                        </div>
                    </div>
                </section>
            `;
        }

        function renderPathShowcase() {
            const activePath = getActivePathId();
            const paths = [
                ['frontend', '🎨', 'Frontend', 'Браузър интерфейси, CSS layout и JavaScript интеракции.'],
                ['backend', '🛠️', 'Backend', 'Сървъри, API маршрути, бази данни и поток на данни.'],
                ['fullstack', '🚀', 'Full-Stack', 'Свързано мислене между frontend, backend и продукт.'],
                ['ai', '🤖', 'AI разработчик', 'AI работни процеси, prompt-и, тестове и продуктивност.'],
                ['mobile', '📱', 'Мобилни приложения', 'Удобни екрани за телефон и responsive UX.']
            ];
            return `<section class="path-showcase" id="learningPathCards">${paths.map(([id, icon, title, text]) => {
                const [count, difficulty, time] = getPathStats(id);
                return `
                <button class="visual-path-card ${activePath === id ? 'active-path' : ''}" data-path="${id}" data-track="${id}" data-action="open-path" type="button">
                    <div class="path-illustration">
                        <span class="path-icon">${icon}</span>
                        ${renderPathArt(id)}
                    </div>
                    <div class="visual-path-title">${title}</div>

        function runJavaScriptChallenge(code, fnName, expected) {
            try {
                const result = Function(`${code}; return typeof ${fnName} === "function" ? ${fnName}(${expected.args}) : undefined;`)();
                return result === expected.value;
            } catch (error) {
                return false;
            }
        }

        function checkInteractiveChallenge() {
            const feedback = document.getElementById('challenge-feedback');
            if (!feedback || !editor) return;
            const code = editor.getValue();
            let passed = false;
            let hint = '';

            if (currentLanguage === 'javascript') {
                passed = /function\s+add\s*\(|(?:const|let)\s+add\s*=/.test(code) &&
                    /return/.test(code) &&
                    runJavaScriptChallenge(code, 'add', { args: '2, 3', value: 5 });
                hint = 'Подсказка: function add(a, b) { return a + b; }';
            } else if (currentLanguage === 'new') {
                passed = /function\s+buildPrompt\s*\(|(?:const|let)\s+buildPrompt\s*=/.test(code) &&
                    /return/.test(code) &&
                    runJavaScriptChallenge(code, 'buildPrompt', { args: '"тест"', value: 'Задача: тест' });
                hint = 'Подсказка: function buildPrompt(task) { return "Задача: " + task; }';
            } else if (currentLanguage === 'python') {
                passed = /def\s+add\s*\(\s*a\s*,\s*b\s*\)\s*:/.test(code) && /return/.test(code) && /\+/.test(code);
                hint = 'Подсказка: def add(a, b): return a + b';
            } else if (currentLanguage === 'web') {
                passed = /<button[\s>]/i.test(code) && /:hover/.test(code) && /(padding|background|border-radius)/.test(code);
                hint = 'Подсказка: добави <button> и CSS правило button:hover { ... }';
            } else if (currentLanguage === 'swift') {
                passed = /func\s+greet\s*\(/.test(code) && /name\s*:/.test(code) && /print\s*\(/.test(code);
                hint = 'Подсказка: func greet(name: String) { print("Здравей, \\(name)") }';
            } else if (currentLanguage === 'backend') {
                passed = /fetch\s*\(/.test(code) && /\/api\/test/.test(code) && /(\.json\s*\(|await)/.test(code);
                hint = 'Подсказка: const res = await fetch("/api/test"); const data = await res.json();';
            }

            feedback.className = `challenge-feedback ${passed ? 'success' : 'error'}`;
            feedback.textContent = passed
                ? '✅ Браво! Задачата мина успешно. Можеш да завършиш урока за XP.'
                : `❌ Почти. ${hint}`;
        }

        async function loadSupabaseLessonsIntoApp() {
            await window.LearningSupabase?.ready?.();
            if (!window.LearningSupabase?.isConfigured()) return;
            try {
                const rows = await window.LearningSupabase.fetchLessons();
                if (!rows?.length) return;
                rows.filter(row => row.published).forEach(row => {
                    const lang = row.lang;
                    const lessonsMap = getLessonMapForLanguage(lang);
                    lessonsMap[row.id] = {
                        category: row.category,
                        title: row.title,
                        description: row.description,
                        detailedExplanation: row.detailedExplanation,
                        code: row.code
                    };
                    topicsByLanguage[lang] = topicsByLanguage[lang] || [];
                    const label = row.label || `${row.order}. ${row.title}`;
                    const existing = topicsByLanguage[lang].find(topic => topic.id === row.id);
                    if (existing) {
                        existing.label = label;
                    } else {
                        topicsByLanguage[lang].push({ id: row.id, label });
                    }
                });
                Object.keys(topicsByLanguage).forEach(lang => {
                    topicsByLanguage[lang].sort((a, b) => {
                        const lessonA = rows.find(row => row.lang === lang && row.id === a.id);
                        const lessonB = rows.find(row => row.lang === lang && row.id === b.id);
                        return (lessonA?.order || 999) - (lessonB?.order || 999);
                    });
                });
            } catch (error) {
                console.warn('Supabase lessons fallback active:', error.message);
            }
        }

        async function syncSupabaseProgressToLocal() {
            await window.LearningSupabase?.ready?.();
            if (!window.LearningSupabase?.isConfigured()) return;
            try {
                const rows = await window.LearningSupabase.fetchProgress();
                if (!rows?.length) return;
                const progress = loadProgress();
                progress.completed = progress.completed || {};
                rows.filter(row => row.completed).forEach(row => {
                    progress.completed[getLessonProgressKey(row.path_slug, row.lesson_slug)] = row.completed_at || new Date().toISOString();
                });
                saveProgress(progress);
            } catch (error) {
                console.warn('Supabase progress fallback active:', error.message);
            }
        }

        function renderTopicsList() {
            const list = document.getElementById('lessons-list');
            const topics = topicsByLanguage[currentLanguage];
            if (!list || !topics) return;
            list.innerHTML = topics.map(t => {
                const locked = !isLessonUnlocked(currentLanguage, t.id);
                const completed = isLessonCompleted(currentLanguage, t.id);
                const statusIcon = completed ? ' ✅' : locked ? ' 🔒' : '';
                const className = [
                    'lesson-item',

                    locked ? 'locked' : '',

                ].filter(Boolean).join(' ');

        function runCode() {
            const code = editor.getValue();
            clearOutput();
            if (currentLanguage === 'web') {
                runWebCode(code);
            } else if (currentLanguage === 'python') {
                setPreviewVisible(false);
                runPythonCode(code);
            } else if (currentLanguage === 'swift') {
                setPreviewVisible(false);
                runSwiftCode(code);
            } else if (currentLanguage === 'backend') {
                setPreviewVisible(false);
                runBackendCode(code);
            } else {
                setPreviewVisible(false);
                runJavaScriptCode(code);
            }
        }

        function runWebCode(code) {
            setPreviewVisible(true);
            let html = code.trim();
            if (!html.includes('<html') && !html.includes('<!DOCTYPE')) {
                if (html.includes('{') && (html.includes('color') || html.includes('background') || html.includes('font'))) {
                    html = `<!DOCTYPE html><html lang="bg"><head><meta charset="UTF-8"><style>${html}</style></head><body><p>Примерен текст за стилове.</p></body></html>`;
                } else {
                    html = `<!DOCTYPE html><html lang="bg"><head><meta charset="UTF-8"></head><body>${html}</body></html>`;
                }
            }
            const iframe = document.getElementById('html-preview');
            iframe.srcdoc = html;
            displayOutput('Визуалният преглед е обновен по-горе.', 'success');
            if (html.includes('<script')) {
                displayOutput('Внимание: script тагове в preview са ограничени (sandbox).', 'success');
            }
        }

        function runBackendCode(code) {
            displayOutput('ℹ️ Backend: fetch и console работят тук. require, fs, Express сървър – в терминал: node server.js или npm run dev', 'success');
            if (/require\s*\(\s*['"]fs['"]/.test(code) || /require\s*\(\s*['"]http['"]/.test(code)) {
                displayOutput('⚠️ require("fs") / require("http") не работят в браузъра – виж кода в server.js и пусни npm start', 'error');
            }
            runJavaScriptCode(code);
        }

        function runSwiftCode(code) {
            displayOutput('ℹ️ Swift се компилира в Xcode или Swift Playgrounds. По-долу: симулация на print() редове.', 'success');
            const lines = code.split('\n');
            let found = false;
            const printRegex = /print\s*\(\s*"((?:[^"\\]|\\.)*)"\s*\)/g;
            const printRegex2 = /print\s*\(\s*'((?:[^'\\]|\\.)*)'\s*\)/g;
            for (const line of lines) {
                let m;
                while ((m = printRegex.exec(line)) !== null) {
                    displayOutput(m[1].replace(/\\n/g, '\n').replace(/\\"/g, '"'), 'success');
                    found = true;
                }
                while ((m = printRegex2.exec(line)) !== null) {
                    displayOutput(m[1], 'success');
                    found = true;
                }
                const printNum = line.match(/print\s*\(\s*([^")]+)\s*\)/);
                if (printNum && !line.includes('"') && !line.includes("'")) {
                    const expr = printNum[1].trim();
                    if (/^-?\d+(\.\d+)?$/.test(expr)) {
                        displayOutput(expr, 'success');
                        found = true;
                    }
                }
            }
            if (!found) {
                displayOutput('Няма разпознати print("...") редове. Копирай кода в Xcode → File → New → Playground.', 'success');
            }
        }

        function runJavaScriptCode(code) {
            const originalLog = console.log;
            const originalError = console.error;
            console.log = function(...args) {
                originalLog.apply(console, args);
                displayOutput(args.map(arg =>
                    typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
                ).join(' '), 'success');
            };
            console.error = function(...args) {
                originalError.apply(console, args);
                displayOutput(args.join(' '), 'error');
            };
            try {
                eval(code);
            } catch (error) {
                displayOutput('Грешка: ' + error.message, 'error');
            } finally {
                console.log = originalLog;
                console.error = originalError;
            }
        }

        function runPythonCode(code) {
            if (typeof Skulpt === 'undefined') {
                displayOutput('Python библиотеката не е заредена. Презареди страницата.', 'error');
                return;
            }
            function outf(text) {
                if (text !== undefined && text !== null && String(text).trim() !== '') {
                    displayOutput(String(text).replace(/\n$/, ''), 'success');
                }
            }
            function builtinRead(x) {
                if (Skulpt.builtinFiles === undefined || Skulpt.builtinFiles["files"][x] === undefined) {
                    throw "File not found: '" + x + "'";
                }
                return Skulpt.builtinFiles["files"][x];
            }
            Sk.configure({
                output: outf,
                read: builtinRead,
                __future__: Sk.python3
            });
            try {
                Sk.importMainWithBody("<stdin>", false, code, true);
            } catch (e) {
                const msg = e.toString ? e.toString() : String(e);
                displayOutput('Грешка: ' + msg, 'error');
            }
        }

        function clearEditor() {
            if (confirm('Сигурен ли си, че искаш да изчистиш кода?')) {
                editor.setValue('');
            }
        }

        function loadExample() {
            const lessons = getLessons();
            if (currentLesson && lessons[currentLesson] && lessons[currentLesson].code) {
                editor.setValue(lessons[currentLesson].code);
            } else {
                alert('Първо избери урок от списъка отляво!');
            }
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            if (currentLanguage !== 'web') {
                setPreviewVisible(false);
            }
        }

        function displayOutput(text, type) {
            const output = document.getElementById('output');
            const p = document.createElement('p');
            p.textContent = text;
            if (type) p.classList.add(type);
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadLesson(lessonId, element, options = {}) {
            if (!options.forceUnlock && !isLessonUnlocked(currentLanguage, lessonId)) {
                displayOutput('🔒 Този урок е заключен. Завърши предишния урок, за да го отключиш.', 'error');
                return;
            }

            currentLesson = lessonId;
            saveLastLessonState(currentLanguage, lessonId);
            document.querySelectorAll('.lesson-item').forEach(item => item.classList.remove('active'));
            if (element) element.classList.add('active');

            const lesson = getLessons()[lessonId];
            if (!lesson) return;

            if (!options.skipEditorReset) {
                if (editor) {
                    editor.setOption('mode', getEditorMode(currentLanguage));
                    editor.setValue(lesson.code || defaultCodeByLanguage[currentLanguage] || '');
                } else {
                    document.getElementById('code-editor').value = lesson.code || defaultCodeByLanguage[currentLanguage] || '';
                }
            }

            const codeEscaped = escapeHtml(lesson.code || '');
            const langName = getLanguageDisplayName(currentLanguage);
            const completed = isLessonCompleted(currentLanguage, lessonId);
            const readingMaterial = document.getElementById('reading-material');
            readingMaterial.classList.remove('lesson-transition');
            void readingMaterial.offsetWidth;
            readingMaterial.classList.add('lesson-transition');
            readingMaterial.innerHTML = `
                ${renderAcademyHero(lesson)}
                ${renderEngagementWidgets()}
                ${renderPathShowcase()}
                ${renderAchievements()}
                ${renderRoadmap()}
                <div class="read-category">${escapeHtml(lesson.category)}</div>
                <h1 class="read-title">${escapeHtml(lesson.title)}</h1>
                <p class="read-lead">${escapeHtml(lesson.description)}</p>
                ${renderLessonDetails(lesson)}
                ${lesson.detailedExplanation || ''}
                <div class="read-section">
                    <h3>📌 Примерен код (${langName})</h3>
                    <p>Натисни „Зареди пример” по-долу, редактирай и „Изпълни код”.</p>
                    <pre class="read-code-block">${codeEscaped}</pre>
                </div>
                ${renderChallengeCard()}
                ${renderMentorCard(lesson)}
                <div class="read-next-step">
                    <strong>🎯 Следваща стъпка:</strong> Зареди примера в редактора и изпълни го. Резултатите са в „Резултати от изпълнението”.
                    <br>
                    <button class="complete-lesson-btn ${completed ? 'done' : ''}" onclick="completeCurrentLesson()" ${completed ? 'disabled' : ''}>
                        ${completed ? '✅ Урокът е завършен' : '🏁 Завърши урока +25 XP'}
                    </button>
                </div>`;
            readingMaterial.scrollTop = 0;
            renderTopicsList();
            renderProgressPanel();
            updateAcademyHeader();
        }

        window.chooseLearningPath = chooseLearningPath;
        window.switchLanguage = switchLanguage;
        window.loadLesson = loadLesson;
        window.startCurrentPath = startCurrentPath;
        window.explorePathCards = explorePathCards;
        window.continueLearning = continueLearning;
        window.loadExample = loadExample;
        window.runCode = runCode;
        window.completeCurrentLesson = completeCurrentLesson;

        function handleAppButtonClick(event) {
            const button = event.target.closest('button, .lesson-item');
            if (!button) return;

            const action = button.dataset.action || '';
            const inlineAction = button.getAttribute('onclick') || '';
            if (!action && !inlineAction) return;

            const readArg = (name) => {
                const match = inlineAction.match(new RegExp(`${name}\\('([^']+)'`));
                return match ? match[1] : null;
            };
            const preventInline = () => {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation?.();
            };

            if (action === 'start-path') {
                preventInline();
                startCurrentPath(button);
                return;
            }

            if (action === 'explore-paths') {
                preventInline();
                explorePathCards(button);
                return;
            }

            if (action === 'open-path') {
                preventInline();
                setButtonFeedback(button);
                chooseLearningPath(button.dataset.track || button.dataset.path || 'frontend');
                return;
            }

            const path = readArg('chooseLearningPath');
            if (path) {
                preventInline();
                setButtonFeedback(button);
                chooseLearningPath(path);
                return;
            }

            const lang = readArg('switchLanguage');
            if (lang) {
                preventInline();
                switchLanguage(lang);
                return;
            }

            const lessonId = readArg('loadLesson');
            if (lessonId) {
                preventInline();
                loadLesson(lessonId, button);
                return;
            }

            const actions = {
                continueLearning,
                runCode,
                clearEditor,
                loadExample,
                showChallengeHint,
                showChallengeSolution,
                checkInteractiveChallenge,
                askMentor,
                completeCurrentLesson,
                toggleLessonDetails,
                skipOnboarding
            };

            Object.entries(actions).some(([name, action]) => {
                if (!inlineAction.startsWith(`${name}(`)) return false;
                preventInline();
                action();
                return true;
            });

            if (inlineAction.startsWith('showOnboardingIfNeeded(')) {
                preventInline();
                explorePathCards(button);
            }
        }

        document.addEventListener('click', handleAppButtonClick, true);

        document.addEventListener('DOMContentLoaded', async function() {
            try {
                initEditor();
            } catch (error) {
                console.warn('Code editor did not initialize:', error);
                document.getElementById('code-editor').value = defaultCodeByLanguage.javascript;
            }
            await loadSupabaseLessonsIntoApp();
            await syncSupabaseProgressToLocal();
            startLearningFlow();
            showOnboardingIfNeeded();
        });
    </script>
</body>
</html>
